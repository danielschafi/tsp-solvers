program: neural/scripts/train.py
method: bayes
metric:
  name: val/loss
  goal: minimize

run_cap: 50

early_terminate:
  type: hyperband
  min_iter: 15

parameters:
  epochs:
    value: 80
  data_path:
    value: "data/gnn_data/50/processed.h5"
  # Fixed from size-25 winner
  lr:
    distribution: log_uniform_values
    min: 1e-3
    max: 1e-2
  weight_decay:
    values: [0.0, 1e-4, 1e-3]
  step_size:
    values: [10, 20, 30]
  gamma:
    distribution: uniform
    min: 0.7
    max: 0.95
  # Size-sensitive — sweep wider
  batch_size:
    values: [16, 32, 64]
  hidden_dim:
    values: [64, 128, 256]
  n_layers:
    values: [2, 3, 4]
  lambda_1:
    distribution: uniform
    min: 3.0
    max: 20.0
  lambda_2:
    distribution: log_uniform_values
    min: 1e-3
    max: 1.0
  temperature:
    distribution: uniform
    min: 1.0
    max: 6.0
  node_features:
    values: ["node_stats", "coords"]
