# Best hyperparameters for problem size 25

# Model architecture (needed for both training and inference)
model:
  hidden_dim: 64
  n_layers: 2
  node_features: "coords"

# Training
training:
  lr: 0.007110998238181188
  weight_decay: 0.001
  step_size: 20
  gamma: 0.8269430734330181
  lambda_1: 5.106082055355636
  lambda_2: 0.020305004887529475
  temperature: 3.9359942155236833
  batch_size: 64
  epochs: 300

# Data
data:
  path: "data/gnn_data/25/processed.h5"
